<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DuoHacker</title>
<style>
  @font-face {
      font-family: "SF Pro Rounded";
      src: url("https://font.duohacker.io.vn/SF-Pro-Rounded-Regular.otf") format("opentype");
      font-weight: 400; font-display: swap;
  }
  @font-face {
      font-family: "SF Pro Rounded";
      src: url("https://font.duohacker.io.vn/SF-Pro-Rounded-Semibold.otf") format("opentype");
      font-weight: 600; font-display: swap;
  }
  @font-face {
      font-family: "SF Pro Rounded";
      src: url("https://font.duohacker.io.vn/SF-Pro-Rounded-Bold.otf") format("opentype");
      font-weight: 700; font-display: swap;
  }
  @font-face {
      font-family: "SF Pro Rounded";
      src: url("https://font.duohacker.io.vn/SF-Pro-Rounded-Heavy.otf") format("opentype");
      font-weight: 800; font-display: swap;
  }
  @font-face {
      font-family: "SF Pro Rounded";
      src: url("https://font.duohacker.io.vn/SF-Pro-Rounded-Black.otf") format("opentype");
      font-weight: 900; font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 280px;
    font-family: "SF Pro Rounded", -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: #fff;
    color: #4B4B4B;
    font-size: 13px;
    user-select: none;
  }

  /* header */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 12px;
    border-bottom: 2px solid #E5E5E5;
  }
  .top-left { display: flex; align-items: center; gap: 8px; }
  .logo {
    width: 32px; height: 32px;
    background: #58CC02;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: #fff;
    font-weight: 800;
    font-size: 16px;
    box-shadow: 0 3px 0 #58A700;
  }
  .name { font-weight: 800; font-size: 15px; letter-spacing: -0.3px; color: #3C3C3C; }
  .ver  { font-size: 10px; color: #AFAFAF; font-weight: 700; }

  /* status bar — class name controlled by popup.js (status-bar + state) */
  .status-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border-bottom: 2px solid #E5E5E5;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #E5E5E5; flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-text {
    display: flex; flex-direction: column; gap: 1px;
    min-width: 0; flex: 1;
  }
  #statusLabel {
    font-size: 11px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: #AFAFAF;
  }
  #statusTab {
    font-size: 11px; font-weight: 700;
    color: #AFAFAF;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #statusTab:empty { display: none; }

  .status-bar.active .dot { background: #58CC02; box-shadow: 0 0 0 3px rgba(88,204,2,0.18); animation: blink 2s ease-in-out infinite; }
  .status-bar.active #statusLabel { color: #58CC02; }
  .status-bar.error  .dot { background: #FF4B4B; box-shadow: 0 0 0 3px rgba(255,75,75,0.18); }
  .status-bar.error  #statusLabel { color: #FF4B4B; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* rows — value class name controlled by popup.js (value + ok/err) */
  .rows { padding: 6px 0; border-bottom: 2px solid #E5E5E5; }
  .row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    gap: 12px;
  }
  .row-key {
    color: #AFAFAF; font-size: 11px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.4px;
    flex-shrink: 0;
  }
  .value {
    font-size: 12px; font-weight: 800;
    color: #4B4B4B;
    text-align: right;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-width: 0;
  }
  .value.ok  { color: #58CC02; }
  .value.err { color: #FF4B4B; }

  /* actions */
  .actions { padding: 14px; display: flex; flex-direction: column; gap: 8px; }

  .btn {
    height: 42px; border-radius: 14px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.6px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.15s ease;
    width: 100%;
  }
  .btn:active { transform: translateY(3px); box-shadow: none !important; }
  .btn:disabled { opacity: 0.4; pointer-events: none; }

  .btn-blue { background: #1CB0F6; color: #fff; box-shadow: 0 4px 0 #1899D6; }
  .btn-soft { background: #F7F7F7; color: #4B4B4B; box-shadow: 0 4px 0 #E5E5E5; }
  .btn-red  { background: #FFDFE0; color: #FF4B4B; box-shadow: 0 4px 0 #FFC0C2; }

  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }
</style>
</head>
<body>

<div class="top">
  <div class="top-left">
    <div class="logo">D</div>
    <span class="name">DuoHacker</span>
  </div>
  <span class="ver" id="hdrVersion">2026.06.08</span>
</div>

<div class="status-bar loading" id="statusBar">
  <div class="dot"></div>
  <div class="status-text">
    <span id="statusLabel">checking...</span>
    <span id="statusTab"></span>
  </div>
</div>

<div class="rows">
  <div class="row">
    <span class="row-key">page</span>
    <span class="value" id="infoPage">—</span>
  </div>
  <div class="row">
    <span class="row-key">script</span>
    <span class="value" id="infoScript">—</span>
  </div>
  <div class="row">
    <span class="row-key">cache</span>
    <span class="value" id="infoCache">—</span>
  </div>
  <div class="row">
    <span class="row-key">cached</span>
    <span class="value" id="infoCacheAge">—</span>
  </div>
</div>

<div class="actions">
  <button class="btn btn-blue" id="btnOpen">Open Duolingo</button>
  <div class="btn-row">
    <button class="btn btn-soft" id="btnRefresh">Refresh</button>
    <button class="btn btn-red"  id="btnClear">Clear cache</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
